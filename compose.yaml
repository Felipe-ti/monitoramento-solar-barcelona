services:
  db:
    image: postgres:18-alpine
    container_name: solar_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # Named volume com driver local (mais robusto para reboots)
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data
        volume:
          nocopy: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  monitor:
    build: .
    container_name: solar_monitor_bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

  sensor:
    build: .
    container_name: solar_sensor_edge
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: ["python", "sensor.py"]

  grafana:
    image: grafana/grafana-oss:11.3.0 # Versão fixada para produção
    container_name: solar_grafana
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000" # A porta padrão universal do Grafana
    volumes:
      # Named volume explícito (padrão Docker)
      - type: volume
        source: grafana-storage
        target: /var/lib/grafana
        volume:
          nocopy: true

volumes:
  # Driver local garante persistência entre reboots
  pgdata:
    driver: local
  grafana-storage:
    driver: local